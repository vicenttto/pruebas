<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

</head>

<body>
    <div id="presupuestador-asf">
        <h3>Calculadora de Vinilos Profesionales</h3>
        <label for="ancho">Ancho (cm):</label>
        <input type="number" id="ancho" placeholder="200...">

        <label for="alto">Alto (cm):</label>
        <input type="number" id="alto" placeholder="100..">

        <label>Material:</label>
        <select id="material">
            <option value="15">Vinilo Monomérico (15€/m²)</option>
            <option value="25">Vinilo Polimérico (25€/m²)</option>
            <option value="40">Vinilo de Corte Especial (40€/m²)</option>
        </select>

        <button type="button" id="calcular" name="calcular">Calcular</button>
        <button type="button" id="btn-whatsapp" name="btn-whatsapp">Pedir por Whatsapp</button>

        
        <div class="resultado">
            Total estimado: <span id="precio-final">0</span>€
        </div>
    </div>
</body>

</html>
